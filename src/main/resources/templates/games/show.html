<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Game Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
<div class="container mt-4">
    <h1 class="mb-4">Game Details</h1>
    <div class="card">
        <div class="card-body">
            <p><strong>ID:</strong> <span th:text="${game.id}"></span></p>
            <p><strong>Title:</strong> <span th:text="${game.title}"></span></p>
            <p><strong>Genre:</strong> <span th:text="${game.genre}"></span></p>
            <p><strong>Platform:</strong> <span th:text="${game.platform}"></span></p>
        </div>
    </div>
    <a class="btn btn-secondary mt-3" href="/games">Back to list</a>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
