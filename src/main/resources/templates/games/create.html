<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Create Game</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
<div class="container mt-4">
    <h1 class="mb-4">Add New Game</h1>
    <form th:action="@{/games/create}" th:object="${game}" method="post">
        <div class="mb-3">
            <label class="form-label">Title</label>
            <input type="text" class="form-control" th:field="*{title}" placeholder="Game title" required />
        </div>
        <div class="mb-3">
            <label class="form-label">Genre</label>
            <input type="text" class="form-control" th:field="*{genre}" placeholder="Genre" required />
        </div>
        <div class="mb-3">
            <label class="form-label">Platform</label>
            <input type="text" class="form-control" th:field="*{platform}" placeholder="Platform" required />
        </div>
        <button type="submit" class="btn btn-success">Create Game</button>
        <a class="btn btn-secondary ms-2" href="/games">Cancel</a>
    </form>
    <p th:if="${error}" th:text="${error}" class="text-danger"></p>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
